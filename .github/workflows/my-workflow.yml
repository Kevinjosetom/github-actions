name: my-workflow

on: push

jobs:
    first-job:
        runs-on: ubuntu-latest
        steps:
        - name: checkout
          uses: actions/checkout@v6
        
        - name: list
          run: ls

        - name: execute sh
          run: |
            chmod +x shell.sh  
            sh ./shell.sh

        - name: read-file
          run: cat dragon.txt


